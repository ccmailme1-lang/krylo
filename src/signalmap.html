<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SignalMap Simulation</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: monospace; color: #fff; }
    .tooltip {
      position: absolute;
      background: rgba(255,255,255,0.88);
      color: #1d1d1f;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="tooltip" id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/examples/js/controls/OrbitControls.js"></script>

<script>
  // Scene, Camera, Renderer
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,0,12);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;
  controls.enablePan = false;
  controls.minDistance = 8;
  controls.maxDistance = 18;

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight.position.set(10,10,10);
  scene.add(dirLight);

  // Nodes data
  const signals = [
    { text: "The avoidance is the agreement.", source: "Audit", strength: 4 },
    { text: "Collective silence detected.", source: "Friction", strength: 3 },
    { text: "Patterns emerging across nodes.", source: "Analytics", strength: 5 },
  ];

  const FIELD_NODE_COUNT = 30;
  const BOUNDS = 6;
  const nodes = [];

  // Tooltip
  const tooltip = document.getElementById('tooltip');

  // Helper to create a sphere mesh
  function createSphere(radius, color) {
    const geometry = new THREE.SphereGeometry(radius, 16, 16);
    const material = new THREE.MeshStandardMaterial({ color, emissive: color, metalness:0.6, roughness:0.2 });
    return new THREE.Mesh(geometry, material);
  }

  // Create primary nodes
  signals.forEach((sig, i)=>{
    const radius = 0.3 + (sig.strength/5)*0.5;
    const node = createSphere(radius, 0x0096ff);
    node.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*8, (Math.random()-0.5)*4);
    node.userData = { text: sig.text, source: sig.source, strength: sig.strength };
    node.velocity = new THREE.Vector3((Math.random()-0.5)*0.02, (Math.random()-0.5)*0.02, (Math.random()-0.5)*0.02);
    scene.add(node);
    nodes.push(node);
  });

  // Create field nodes
  for(let i=0;i<FIELD_NODE_COUNT;i++){
    const node = createSphere(0.08, 0x0096ff);
    node.material.transparent = true;
    node.material.opacity = 0.35;
    node.position.set((Math.random()-0.5)*12,(Math.random()-0.5)*12,(Math.random()-0.5)*12);
    node.velocity = new THREE.Vector3((Math.random()-0.5)*0.05,(Math.random()-0.5)*0.05,(Math.random()-0.5)*0.05);
    scene.add(node);
    nodes.push(node);
  }

  // Raycaster for tooltip
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function onMouseMove(event){
    mouse.x = (event.clientX/window.innerWidth)*2 -1;
    mouse.y = -(event.clientY/window.innerHeight)*2 +1;
  }
  window.addEventListener('mousemove', onMouseMove, false);

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    const time = performance.now()*0.001;

    nodes.forEach(node=>{
      node.position.add(node.velocity);
      ['x','y','z'].forEach(axis=>{
        if(Math.abs(node.position[axis])>BOUNDS) node.velocity[axis]*=-1;
      });
      if(node.userData.strength) {
        const pulse = 1 + Math.sin(time*3)*0.12;
        node.scale.set(pulse,pulse,pulse);
      }
    });

    // Tooltip
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodes);
    if(intersects.length>0 && intersects[0].object.userData.text){
      const obj = intersects[0].object;
      tooltip.style.display = 'block';
      tooltip.style.left = (event.clientX + 12)+'px';
      tooltip.style.top = (event.clientY + 12)+'px';
      tooltip.innerHTML = `${obj.userData.text} <br/><small>Source: ${obj.userData.source}</small>`;
    } else {
      tooltip.style.display = 'none';
    }

    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  // Resize handling
  window.addEventListener('resize', ()=> {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

</script>
</body>
</html>
