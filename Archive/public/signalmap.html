<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Signal Map</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 12;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const nodes = [];
  const NODE_COUNT = 30;
  for(let i=0;i<NODE_COUNT;i++){
    const geometry = new THREE.SphereGeometry(0.3, 16, 16);
    const material = new THREE.MeshStandardMaterial({ color: 0x0096ff });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set((Math.random()-0.5)*8,(Math.random()-0.5)*8,(Math.random()-0.5)*8);
    mesh.velocity = new THREE.Vector3((Math.random()-0.5)*0.02,(Math.random()-0.5)*0.02,(Math.random()-0.5)*0.02);
    scene.add(mesh);
    nodes.push(mesh);
  }

  const light = new THREE.DirectionalLight(0xffffff, 0.6);
  light.position.set(10,10,10);
  scene.add(light);
  scene.add(new THREE.AmbientLight(0xffffff, 0.15));

  function animate(){
    requestAnimationFrame(animate);
    nodes.forEach(n=>{
      n.position.add(n.velocity);
      ['x','y','z'].forEach(axis=>{
        if(Math.abs(n.position[axis])>6) n.velocity[axis]*=-1;
      });
    });
    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
```
